version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET:-travelling-cv-secret-key-production}
    volumes:
      - server-uploads:/app/uploads
      - server-data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - BACKEND_URL=http://server:5000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-uploads:
  server-data:
